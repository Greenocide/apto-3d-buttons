<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apto 3D Buttons CDN Usage</title>
  <!-- Replace these local paths with your CDN/static-host URLs. -->
  <link rel="stylesheet" href="../dist/apto-3d-buttons.css">
  <script src="../dist/apto-3d-buttons.global.js" defer></script>
</head>
<body>
  <button class="apto-3d-button apto-3d-button--violet" type="button">
    <span class="apto-3d-button__content">
      <span class="apto-3d-button__text">Push me</span>
    </span>
  </button>

  <button class="apto-3d-button apto-3d-button--green" type="button" data-apto-complete>
    <span class="apto-3d-button__content">
      <span class="apto-3d-button__text">Submit</span>
    </span>
  </button>
</body>
</html>
