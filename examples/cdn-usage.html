<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apto 3D Buttons CDN Usage</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Greenocide/apto-3d-buttons@v0.4.2/dist/apto-3d-buttons.css">
  <script src="https://cdn.jsdelivr.net/gh/Greenocide/apto-3d-buttons@v0.4.2/dist/apto-3d-buttons.global.js" defer></script>
</head>
<body>
  <button class="apto-3d-button apto-3d-button--violet" type="button">
    <span class="apto-3d-button__content">
      <span class="apto-3d-button__text">Push me</span>
    </span>
  </button>

  <button class="apto-3d-button apto-3d-button--green" type="button" data-apto-complete>
    <span class="apto-3d-button__content">
      <span class="apto-3d-button__text">Submit</span>
    </span>
  </button>

  <label class="apto-3d-checkbox apto-3d-checkbox--green">
    <input type="checkbox" name="updates" value="yes" checked>
    <span class="apto-3d-checkbox__box" aria-hidden="true"><span class="apto-3d-checkbox__front"></span></span>
    <span class="apto-3d-checkbox__label">Email updates</span>
  </label>

  <label class="apto-3d-switch apto-3d-switch--violet">
    <input type="checkbox" name="notifications" role="switch">
    <span class="apto-3d-switch__track" aria-hidden="true"><span class="apto-3d-switch__front"></span></span>
    <span class="apto-3d-switch__label">Notifications</span>
  </label>

  <label class="apto-3d-slider apto-3d-slider--primary">
    <span class="apto-3d-slider__header">
      <span class="apto-3d-slider__label">Volume</span>
      <output class="apto-3d-slider__output" data-apto-slider-output></output>
    </span>
    <input type="range" name="volume" min="0" max="100" value="65" data-apto-slider-suffix="%">
  </label>

  <div class="apto-3d-scrollbar apto-3d-scrollbar--violet" style="max-height: 120px;">
    <p>Scrollable content</p><p>More content</p><p>More content</p><p>More content</p>
  </div>

  <label class="apto-3d-radio apto-3d-radio--primary">
    <input type="radio" name="plan" value="starter" checked>
    <span class="apto-3d-radio__control" aria-hidden="true"><span class="apto-3d-radio__front"></span></span>
    <span class="apto-3d-radio__label">Starter plan</span>
  </label>

  <div class="apto-3d-tabs apto-3d-tabs--primary" data-apto-tabs>
    <div class="apto-3d-tablist" role="tablist" aria-label="Example views">
      <button class="apto-3d-tab" type="button" role="tab" id="one-tab" aria-controls="one-panel" aria-selected="true" data-apto-tab><span class="apto-3d-tab__front">One</span></button>
      <button class="apto-3d-tab" type="button" role="tab" id="two-tab" aria-controls="two-panel" aria-selected="false" data-apto-tab><span class="apto-3d-tab__front">Two</span></button>
    </div>
    <div class="apto-3d-tabpanels">
      <section class="apto-3d-tabpanel" id="one-panel" role="tabpanel" aria-labelledby="one-tab">First view</section>
      <section class="apto-3d-tabpanel" id="two-panel" role="tabpanel" aria-labelledby="two-tab" hidden>Second view</section>
    </div>
  </div>
</body>
</html>
